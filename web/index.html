<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DelayedNotifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0d0f12;
            --surface:   #141720;
            --border:    #232736;
            --border2:   #2e3347;
            --text:      #dde1f0;
            --muted:     #6b7294;
            --accent:    #4f8fff;
            --accent2:   #6c63ff;
            --green:     #3dd68c;
            --red:       #f0544f;
            --yellow:    #f4c430;
            --orange:    #ff8c42;
            --mono:      'IBM Plex Mono', monospace;
            --sans:      'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── TOP BAR ── */
        .topbar {
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        .topbar-right {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        /* ── LAYOUT ── */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 0;
            max-height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* ── SIDEBAR (FORM) ── */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 28px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            font-family: var(--mono);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .form-group label .req { color: var(--red); }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 6px;
            font-size: 14px;
            font-family: var(--sans);
            color: var(--text);
            transition: border-color 0.15s;
        }

        .form-group select option { background: var(--surface); }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,143,255,0.12);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }

        .hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 5px;
            font-family: var(--mono);
        }

        .hint.warn { color: var(--yellow); }

        /* ── SUBMIT BUTTON ── */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            font-family: var(--sans);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-submit:hover:not(:disabled) { background: #3a7aee; transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ALERT ── */
        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            border-left: 3px solid transparent;
            font-family: var(--mono);
        }

        .alert.show { display: block; animation: fadeSlide 0.2s ease; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert-success { background: rgba(61,214,140,0.1); border-color: var(--green); color: var(--green); }
        .alert-error   { background: rgba(240,84,79,0.1);  border-color: var(--red);   color: var(--red); }

        /* ── RIGHT PANEL ── */
        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: stretch;
        }

        .stat-item {
            flex: 1;
            padding: 14px 20px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-item:last-child { border-right: none; }

        .stat-value {
            font-family: var(--mono);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            transition: color 0.3s;
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .stat-item.s-waiting  .stat-value { color: var(--yellow); }
        .stat-item.s-sent     .stat-value { color: var(--green); }
        .stat-item.s-failed   .stat-value { color: var(--red); }
        .stat-item.s-cancelled .stat-value { color: var(--muted); }

        /* ── TOOLBAR ── */
        .toolbar {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn {
            padding: 5px 12px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
            border-radius: 4px;
            font-size: 12px;
            font-family: var(--mono);
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

        .filter-btn.active {
            border-color: var(--accent);
            background: rgba(79,143,255,0.12);
            color: var(--accent);
        }

        .toolbar-spacer { flex: 1; }

        .refresh-btn {
            padding: 5px 12px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
            border-radius: 4px;
            font-size: 12px;
            font-family: var(--mono);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

        /* ── LIST ── */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        .list-wrap::-webkit-scrollbar { width: 6px; }
        .list-wrap::-webkit-scrollbar-track { background: transparent; }
        .list-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        /* ── NOTIFICATION CARD ── */
        .ncard {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            transition: border-color 0.15s;
            animation: fadeSlide 0.25s ease;
        }

        .ncard:hover { border-color: var(--border2); }

        .ncard-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .ncard-id {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* STATUS BADGES */
        .badge {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-waiting    { background: rgba(244,196,48,0.15);  color: var(--yellow); border: 1px solid rgba(244,196,48,0.3); }
        .badge-in_process { background: rgba(79,143,255,0.15);  color: var(--accent); border: 1px solid rgba(79,143,255,0.3); animation: blink 1.5s infinite; }
        .badge-sent       { background: rgba(61,214,140,0.12);  color: var(--green);  border: 1px solid rgba(61,214,140,0.3); }
        .badge-failed     { background: rgba(240,84,79,0.12);   color: var(--red);    border: 1px solid rgba(240,84,79,0.3); }
        .badge-cancelled  { background: rgba(107,114,148,0.12); color: var(--muted);  border: 1px solid rgba(107,114,148,0.3); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.55; }
        }

        .ncard-body { margin-bottom: 10px; }

        .ncard-recipient {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .channel-tag {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 3px;
            background: rgba(108,99,255,0.15);
            color: var(--accent2);
            border: 1px solid rgba(108,99,255,0.25);
        }

        .ncard-payload {
            font-size: 13px;
            color: var(--muted);
            word-break: break-word;
        }

        .ncard-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 10px;
        }

        .meta-item {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-item svg { opacity: 0.5; }

        .error-box {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(240,84,79,0.08);
            border: 1px solid rgba(240,84,79,0.2);
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--red);
            word-break: break-word;
        }

        .ncard-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .btn-action {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-family: var(--mono);
            font-weight: 500;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            transition: all 0.15s;
        }

        .btn-cancel {
            border-color: rgba(240,84,79,0.4);
            color: var(--red);
        }

        .btn-cancel:hover { background: rgba(240,84,79,0.1); border-color: var(--red); }

        .btn-refresh {
            border-color: var(--border2);
            color: var(--muted);
        }

        .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

        /* ── EMPTY STATE ── */
        .empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--muted);
        }

        .empty-icon {
            width: 48px; height: 48px;
            opacity: 0.2;
            margin: 0 auto 16px;
        }

        .empty p { font-family: var(--mono); font-size: 13px; }
        .empty p + p { font-size: 11px; margin-top: 6px; opacity: 0.6; }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; max-height: none; overflow: visible; }
            .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
            .panel { height: 60vh; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <div class="logo-dot"></div>
        DELAYED<span style="color:var(--accent)">NOTIFIER</span>
    </div>
    <div class="topbar-right" id="tzBadge"></div>
</div>

<div class="main">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div>
            <div class="section-label">Новое уведомление</div>
            <div id="alert" class="alert"></div>

            <div class="form-group">
                <label for="channel">Канал <span class="req">*</span></label>
                <select id="channel" required>
                    <option value="">— выберите —</option>
                    <option value="email">Email</option>
                    <option value="telegram">Telegram</option>
                </select>
            </div>

            <div class="form-group">
                <label for="recipient">Получатель <span class="req">*</span></label>
                <input type="text" id="recipient" placeholder="user@example.com" required />
                <div class="hint" id="recipientHint">Выберите канал выше</div>
            </div>

            <div class="form-group">
                <label for="payload">Сообщение <span class="req">*</span></label>
                <textarea id="payload" placeholder="Текст уведомления..." required></textarea>
                <div class="hint">
                    Для email можно JSON: <code style="font-size:10px;">{"subject":"…","body":"…"}</code>
                </div>
            </div>

            <div class="form-group">
                <label for="scheduledAt">Время отправки <span class="req">*</span></label>
                <input type="datetime-local" id="scheduledAt" required />
                <div class="hint" id="timeHint"></div>
            </div>

            <button class="btn-submit" id="submitBtn">
                <span id="submitText">Создать</span>
                <div id="submitSpinner" class="spinner" style="display:none"></div>
            </button>
        </div>
    </aside>

    <!-- ── RIGHT PANEL ── -->
    <div class="panel">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Всего</div>
            </div>
            <div class="stat-item s-waiting">
                <div class="stat-value" id="statWaiting">0</div>
                <div class="stat-label">Ожидают</div>
            </div>
            <div class="stat-item s-sent">
                <div class="stat-value" id="statSent">0</div>
                <div class="stat-label">Отправлено</div>
            </div>
            <div class="stat-item s-failed">
                <div class="stat-value" id="statFailed">0</div>
                <div class="stat-label">Ошибки</div>
            </div>
            <div class="stat-item s-cancelled">
                <div class="stat-value" id="statCancelled">0</div>
                <div class="stat-label">Отменено</div>
            </div>
        </div>

        <div class="toolbar">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="waiting">Ожидают</button>
            <button class="filter-btn" data-filter="in_process">В процессе</button>
            <button class="filter-btn" data-filter="sent">Отправлено</button>
            <button class="filter-btn" data-filter="failed">Ошибки</button>
            <button class="filter-btn" data-filter="cancelled">Отменено</button>
            <div class="toolbar-spacer"></div>
            <button class="refresh-btn" id="refreshAllBtn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                обновить
            </button>
        </div>

        <div class="list-wrap" id="listWrap">
            <div class="empty">
                <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
                <p>Уведомлений пока нет</p>
                <p>Создайте первое через форму слева</p>
            </div>
        </div>
    </div>

</div>

<script>
    const API = window.location.origin;

    // ── STATE ──────────────────────────────────────────────────────────────
    let notifications = [];  // массив объектов из API
    let filter = 'all';

    // ── UTILS ──────────────────────────────────────────────────────────────
    function esc(str) {
        const d = document.createElement('div');
        d.textContent = String(str ?? '');
        return d.innerHTML;
    }

    function fmtDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleString('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function toLocalInput(date) {
        const d = new Date(date);
        const pad = n => String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ── TIMEZONE ───────────────────────────────────────────────────────────
    function updateTz() {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const off = -new Date().getTimezoneOffset() / 60;
        document.getElementById('tzBadge').textContent = `${tz} (UTC${off >= 0 ? '+' : ''}${off})`;
    }

    // ── DATETIME INPUT ─────────────────────────────────────────────────────
    function initDateTime() {
        const inp = document.getElementById('scheduledAt');
        const now = new Date();
        now.setMinutes(now.getMinutes() + 1);
        inp.min   = toLocalInput(now);
        inp.value = toLocalInput(now);
        updateTimeHint();
    }

    function updateTimeHint() {
        const inp = document.getElementById('scheduledAt');
        const hint = document.getElementById('timeHint');
        const diff = new Date(inp.value) - new Date();
        if (diff <= 0) {
            hint.textContent = '⚠ Время должно быть в будущем';
            hint.classList.add('warn');
            return;
        }
        hint.classList.remove('warn');
        const m = Math.floor(diff / 60000);
        const h = Math.floor(m / 60);
        hint.textContent = h > 0
            ? `через ${h} ч ${m % 60} мин`
            : `через ${m} мин`;
    }

    // ── CHANNEL HINT ───────────────────────────────────────────────────────
    document.getElementById('channel').addEventListener('change', e => {
        const hint = document.getElementById('recipientHint');
        const inp  = document.getElementById('recipient');
        if (e.target.value === 'email') {
            hint.textContent   = 'Введите email: user@example.com';
            inp.placeholder    = 'user@example.com';
            inp.type           = 'email';
        } else if (e.target.value === 'telegram') {
            hint.textContent   = 'Введите числовой chat_id или @username';
            inp.placeholder    = '123456789 или @username';
            inp.type           = 'text';
        } else {
            hint.textContent   = 'Выберите канал выше';
            inp.placeholder    = '';
            inp.type           = 'text';
        }
    });

    document.getElementById('scheduledAt').addEventListener('input', updateTimeHint);

    // ── ALERT ──────────────────────────────────────────────────────────────
    function showAlert(msg, type = 'success') {
        const el = document.getElementById('alert');
        el.className = `alert alert-${type} show`;
        el.textContent = msg;
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 5000);
    }

    // ── STATS ──────────────────────────────────────────────────────────────
    function updateStats() {
        const count = s => notifications.filter(n => n.status === s).length;
        document.getElementById('statTotal').textContent     = notifications.length;
        document.getElementById('statWaiting').textContent   = count('waiting');
        document.getElementById('statSent').textContent      = count('sent');
        document.getElementById('statFailed').textContent    = count('failed');
        document.getElementById('statCancelled').textContent = count('cancelled');
    }

    // ── RENDER ─────────────────────────────────────────────────────────────
    function render() {
        const wrap = document.getElementById('listWrap');
        const list = filter === 'all'
            ? notifications
            : notifications.filter(n => n.status === filter);

        updateStats();

        if (list.length === 0) {
            wrap.innerHTML = `
                <div class="empty">
                    <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                    <p>${filter === 'all' ? 'Уведомлений пока нет' : `Нет записей со статусом «${filter}»`}</p>
                </div>`;
            return;
        }

        wrap.innerHTML = list.map(n => {
            const statusClass   = `badge-${(n.status||'waiting').toLowerCase()}`;
            const canCancel     = !['sent','cancelled'].includes(n.status);
            const recipientLabel = esc(n.recipient_identifier || n.recipient || '—');

            return `
            <div class="ncard" data-id="${esc(n.id)}">
                <div class="ncard-top">
                    <span class="ncard-id">${esc(n.id)}</span>
                    <span class="badge ${statusClass}">${esc(n.status||'waiting')}</span>
                </div>
                <div class="ncard-body">
                    <div class="ncard-recipient">
                        <span class="channel-tag">${esc(n.channel)}</span>
                        ${recipientLabel}
                    </div>
                    <div class="ncard-payload">${esc(n.payload)}</div>
                </div>
                <div class="ncard-meta">
                    <span class="meta-item">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        ${fmtDate(n.scheduled_at)}
                    </span>
                    ${n.sent_at ? `<span class="meta-item" style="color:var(--green)">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        ${fmtDate(n.sent_at)}
                    </span>` : ''}
                    ${n.retry_count ? `<span class="meta-item" style="color:var(--orange)">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                        retry: ${n.retry_count}
                    </span>` : ''}
                    <span class="meta-item">создано: ${fmtDate(n.created_at)}</span>
                </div>
                ${n.last_error ? `<div class="error-box">⚠ ${esc(n.last_error)}</div>` : ''}
                <div class="ncard-actions">
                    ${canCancel ? `<button class="btn-action btn-cancel" data-action="cancel" data-id="${esc(n.id)}">Отменить</button>` : ''}
                    <button class="btn-action btn-refresh" data-action="refresh" data-id="${esc(n.id)}">Обновить</button>
                </div>
            </div>`;
        }).join('');
    }

    // ── DELEGATION — один listener на весь список ──────────────────────────
    // ИСПРАВЛЕНО: listener навешивается один раз на wrapper, не при каждом render()
    document.getElementById('listWrap').addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const { action, id } = btn.dataset;
        if (action === 'cancel')  doCancel(id);
        if (action === 'refresh') doRefresh(id);
    });

    // ── FILTER ─────────────────────────────────────────────────────────────
    document.querySelector('.toolbar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    });

    // ── API CALLS ──────────────────────────────────────────────────────────
    async function doCreate(data) {
        const resp = await fetch(`${API}/notify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        return [resp.ok, await resp.json()];
    }

    async function fetchStatus(id) {
        try {
            const resp = await fetch(`${API}/notify/${id}`);
            if (resp.ok) return await resp.json();
        } catch {}
        return null;
    }

    async function doCancel(id) {
        if (!confirm('Отменить это уведомление?')) return;
        try {
            const resp = await fetch(`${API}/notify/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                const n = notifications.find(n => n.id === id);
                if (n) n.status = 'cancelled';
                showAlert('Уведомление отменено');
                render();
            } else {
                const r = await resp.json();
                showAlert(`Ошибка: ${r.error || r.details}`, 'error');
            }
        } catch (err) {
            showAlert(`Ошибка сети: ${err.message}`, 'error');
        }
    }

    async function doRefresh(id) {
        const data = await fetchStatus(id);
        if (!data) return;
        const idx = notifications.findIndex(n => n.id === id);
        if (idx !== -1) {
            // ИСПРАВЛЕНО: маппим только поля которые реально есть в API-ответе
            notifications[idx] = {
                ...notifications[idx],
                status:               data.status,
                sent_at:              data.sent_at,
                retry_count:          data.retry_count,
                last_error:           data.last_error,
                recipient_identifier: data.recipient_identifier,
                scheduled_at:         data.scheduled_at,
                created_at:           data.created_at,
            };
            render();
        }
    }

    // ── REFRESH ALL ────────────────────────────────────────────────────────
    // Запросы идут последовательно с паузой 300ms — не заваливаем лог сервера
    // пачкой одновременных запросов при нескольких активных уведомлениях.
    async function refreshAll() {
        const btn = document.getElementById('refreshAllBtn');
        btn.classList.add('spinning');
        const active = notifications.filter(n => ['waiting','in_process'].includes(n.status));
        for (const n of active) {
            await doRefresh(n.id);
            if (active.length > 1) await new Promise(r => setTimeout(r, 300));
        }
        btn.classList.remove('spinning');
    }

    document.getElementById('refreshAllBtn').addEventListener('click', refreshAll);

    // ── SUBMIT FORM ────────────────────────────────────────────────────────
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const channel     = document.getElementById('channel').value;
        const recipient   = document.getElementById('recipient').value.trim();
        const payload     = document.getElementById('payload').value.trim();
        const scheduledAt = document.getElementById('scheduledAt').value;

        if (!channel || !recipient || !payload || !scheduledAt) {
            showAlert('Заполните все обязательные поля', 'error');
            return;
        }

        const btn     = document.getElementById('submitBtn');
        const txt     = document.getElementById('submitText');
        const spinner = document.getElementById('submitSpinner');
        btn.disabled      = true;
        txt.style.display = 'none';
        spinner.style.display = '';

        try {
            const [ok, result] = await doCreate({
                channel,
                recipient,
                payload,
                // ИСПРАВЛЕНО: нет user_id — его убрали из API
                scheduled_at: new Date(scheduledAt).toISOString(),
            });

            if (ok) {
                showAlert('Уведомление создано');
                document.getElementById('payload').value = '';
                initDateTime();

                // Добавляем в начало списка, используя поля из ответа API
                notifications.unshift({
                    id:                   result.id,
                    channel:              result.channel,
                    recipient_identifier: result.recipient,
                    payload:              result.payload,
                    scheduled_at:         result.scheduled_at,
                    status:               'waiting',
                    created_at:           new Date().toISOString(),
                    retry_count:          0,
                    sent_at:              null,
                    last_error:           null,
                });
                render();
            } else {
                showAlert(`Ошибка: ${result.error || result.details || 'неизвестная ошибка'}`, 'error');
            }
        } catch (err) {
            showAlert(`Ошибка сети: ${err.message}`, 'error');
        } finally {
            btn.disabled      = false;
            txt.style.display = '';
            spinner.style.display = 'none';
        }
    });

    // ── AUTO-REFRESH ───────────────────────────────────────────────────────
    // 30s вместо 10s — снижает шум в логах сервера в 3 раза.
    // Для финальных статусов (sent/cancelled/failed без retry) обновление не нужно —
    // refreshAll сам фильтрует только waiting/in_process.
    setInterval(refreshAll, 30_000);
    setInterval(updateTimeHint, 30_000);

    // ── INIT ───────────────────────────────────────────────────────────────
    updateTz();
    initDateTime();
    render();
</script>
</body>
</html>
